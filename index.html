// ══════════════════════════════════════════════════════
//  FIREBASE HOOK
// ══════════════════════════════════════════════════════
function useFirebase() {
  const dbRef = useRef(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!IS_CONFIGURED) return;
    const loadScript = src => new Promise((res, rej) => {
      if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
      const s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    (async () => {
      try {
        await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
        await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js");
        if (!window.firebase.apps.length) window.firebase.initializeApp(FIREBASE_CONFIG);
        dbRef.current = window.firebase.database();
        setReady(true);
      } catch(e) { console.error(e); }
    })();
  }, []);

  const listen = cb => {
    if (!dbRef.current) return () => {};
    const ref = dbRef.current.ref("coatingData");
    ref.on("value", snap => cb(snap.val() || {}));
    return () => ref.off("value");
  };
  const write = async (locId, bkg, estimate, updatedBy) => {
    if (!dbRef.current) throw new Error("Firebase not ready");
    await dbRef.current.ref(`coatingData/${locId}`).set({
      bkg: Number(bkg), estimate: Number(estimate),
      updatedBy: updatedBy || "Unknown", updatedAt: new Date().toISOString(),
    });
  };
  return { ready, listen, write };
}

// ══════════════════════════════════════════════════════
//  LOCAL STORAGE FALLBACK
// ══════════════════════════════════════════════════════
const localDB = {
  read: () => { try { return JSON.parse(localStorage.getItem("coatingData") || "{}"); } catch { return {}; } },
  write: (id, bkg, estimate, name) => {
    const d = localDB.read();
    d[id] = { bkg: Number(bkg), estimate: Number(estimate), updatedBy: name||"?", updatedAt: new Date().toISOString() };
    localStorage.setItem("coatingData", JSON.stringify(d));
    return d;
  },
};

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
const sum    = (ids, data, field) => ids.reduce((a, id) => a + (data[id]?.[field] || 0), 0);
const sumTgt = (ids, field)       => ids.reduce((a, id) => a + (LOCATIONS.find(l => l.id === id)?.[field] || 0), 0);
// FIX: APR GAP = APR TGT - ESTIMATE TILL DATE
const gap    = (aprTgt, est)      => aprTgt - est;
const gapSum = (ids, data)        => sumTgt(ids,"aprTgt") - sum(ids,data,"estimate");
const fmtTime = iso => iso ? new Date(iso).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}) : null;
const today   = new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});

const thBase = { borderBottom:"2px solid #1e293b", textAlign:"center", textTransform:"uppercase", letterSpacing:"0.05em", color:"#94a3b8", fontSize:11, padding:"9px 4px", fontWeight:700 };

function Badge({ value, target }) {
  const pct   = target ? (value/target)*100 : 0;
  const color = pct >= 80 ? "#16a34a" : pct >= 50 ? "#d97706" : "#dc2626";
  return <span className="badge" style={{ display:"inline-block", padding:"2px 6px", borderRadius:99, fontSize:11, fontWeight:700, color, background:color+"18" }}>{value}</span>;
}

            {isLive ? "🔴 Live — updates visible to everyone instantly" : "⚠ Firebase not configured — saving locally"}

        </div>

        {done ? (
          <div style={{ padding:40, textAlign:"center" }}>
            <div style={{ fontSize:52, marginBottom:10 }}>✅</div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:20, fontWeight:800, color:"#0f172a" }}>Submitted!</div>
            <div style={{ color:"#64748b", marginTop:8, fontSize:14 }}><b>{selLoc?.name}</b> updated</div>
            <div style={{ marginTop:4, fontSize:13, color:"#94a3b8" }}>Bkg: {bkg} · Estimate: {est}</div>
            <button onClick={reset} style={{ marginTop:20, background:"#1e3a5f", color:"#fff", border:"none", borderRadius:12, padding:"11px 24px", cursor:"pointer", fontWeight:700, fontSize:14 }}>Submit Another</button>
          </div>
        ) : (
          <div style={{ padding:24 }}>

            {/* Name */}
            <div style={{ marginBottom:14 }}>
              <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#94a3b8", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>Your Name</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Manager name" style={inp} />

            {/* Location */}

              <select value={loc} onChange={e=>setLoc(e.target.value)} style={{ ...inp, background:"#fff" }}>

            {loc && (

              {saving ? "Saving…" : "Submit Update"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  DOWNLOAD AS IMAGE
// ══════════════════════════════════════════════════════
function downloadImage(tableRef) {
  if (!tableRef.current) return;
  html2canvas(tableRef.current, {
    scale: 2,
    backgroundColor: "#f1f5f9",
    useCORS: true,
    logging: false,
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = `Coating-Report-${new Date().toLocaleDateString("en-IN").replace(/\//g,"-")}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

// ══════════════════════════════════════════════════════
//  MAIN APP
// ══════════════════════════════════════════════════════
function CoatingTracker() {
  const [view,       setView]       = useState("dashboard");
  const [data,       setData]       = useState({});
  const [lastUpdate, setLastUpdate] = useState(null);
  const [capturing,  setCapturing]  = useState(false);
  const tableRef = useRef(null);
  const firebase = useFirebase();

  useEffect(() => {
    const setTime = d => {
      const times = Object.values(d).map(v=>v.updatedAt).filter(Boolean).sort().reverse();
      if (times[0]) setLastUpdate(new Date(times[0]).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}));
    };
    if (firebase.ready) {
      return firebase.listen(snap => { setData(snap); setTime(snap); });
    } else {
      const d = localDB.read(); setData(d); setTime(d);
    }
  }, [firebase.ready]);

  const handleSubmit = async (locId, bkg, est, name) => {
    if (firebase.ready) {
      await firebase.write(locId, bkg, est, name);
    } else {
      const updated = localDB.write(locId, bkg, est, name);
      setData(updated);
      setLastUpdate(new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}));
    }
  };

  const handleDownload = async () => {
    setCapturing(true);
    setTimeout(() => {
      downloadImage(tableRef);
      setTimeout(() => setCapturing(false), 1000);
    }, 100);
  };

  const allArenaIds = ARENA_CLUSTERS.flatMap(c => CLUSTERS[c]);
  const allNexaIds  = CLUSTERS["Nexa"];
  const allIds      = [...allArenaIds, ...allNexaIds];

  if (view === "form") {
    return <FormView onBack={()=>setView("dashboard")} onSubmit={handleSubmit} isLive={firebase.ready} existingData={data} />;
  }

  const kpis = [
    { label:"Q1 Target",          value:sumTgt(allIds,"q1Tgt"),             accent:"#1e3a5f" },
    { label:"Apr Target",         value:sumTgt(allIds,"aprTgt"),             accent:"#7c3aed" },
    { label:"Bkg Till Date",      value:sum(allIds,data,"bkg"),              accent:"#0891b2" },
    { label:"Estimate Till Date", value:sum(allIds,data,"estimate"),         accent:"#059669" },
    { label:"April Gap",          value:gapSum(allIds,data),                 accent:"#dc2626" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#f1f5f9" }}>

      {/* Top bar */}
      <div style={{ background:"linear-gradient(135deg,#0f172a,#1e3a5f)", padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:8, flexWrap:"wrap" }}>
        <div>
          <div className="topbar-title" style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:800, color:"#fff", display:"flex", alignItems:"center", gap:8 }}>
            Coating Progress Report
            <span style={{ fontSize:10, padding:"2px 7px", borderRadius:99, background:firebase.ready?"rgba(34,197,94,0.2)":"rgba(251,191,36,0.2)", color:firebase.ready?"#86efac":"#fcd34d" }}>
              {firebase.ready ? "🔴 LIVE" : "LOCAL"}
            </span>
          </div>
          <div className="topbar-sub" style={{ fontSize:11, color:"#94a3b8", marginTop:2 }}>
            Q1 Till Date · {today}{lastUpdate && ` · Updated: ${lastUpdate}`}
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={handleDownload} disabled={capturing}
            style={{ background:"#1e293b", color:"#94a3b8", border:"1px solid #334155", borderRadius:10, padding:"8px 14px", fontWeight:600, fontSize:12, cursor:"pointer" }}>
            {capturing ? "Capturing…" : "📷 Download"}
          </button>
          <button className="btn-update" onClick={()=>setView("form")}
            style={{ background:"#f97316", color:"#fff", border:"none", borderRadius:10, padding:"9px 18px", fontWeight:700, fontSize:13, cursor:"pointer", boxShadow:"0 4px 14px rgba(249,115,22,0.4)" }}>
            + Update Data
          </button>
        </div>
      </div>

      {/* Capture area starts here */}
      <div ref={tableRef} style={{ background:"#f1f5f9" }}>

        {/* KPI cards */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8, padding:"12px 12px 0" }}>
          {kpis.map(({ label, value, accent }) => (
            <div key={label} style={{ background:"#fff", borderRadius:10, padding:"10px 10px", boxShadow:"0 2px 6px rgba(0,0,0,0.06)", borderTop:`3px solid ${accent}` }}>
              <div className="kpi-label" style={{ fontSize:9, color:"#94a3b8", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.04em" }}>{label}</div>
              <div className="kpi-val" style={{ fontSize:22, fontWeight:800, color:accent, fontFamily:"'Syne',sans-serif", marginTop:2 }}>{value}</div>
            </div>
          ))}
        </div>

        {/* Table */}
        <div style={{ margin:"10px 12px 16px", background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,0.08)" }}>
          <table className="report-table">
            <thead>
              <tr style={{ background:"#0f172a" }}>
                <th className="col-loc" style={{ ...thBase, textAlign:"left", paddingLeft:10, color:"#e2e8f0" }}>LOCATION</th>
                <th className="col-q1"  style={thBase}>Q1</th>
                <th className="col-apr" style={thBase}>APR</th>
                <th className="col-bkg" style={{ ...thBase, color:"#7dd3fc" }}>BKG</th>
                <th className="col-est" style={{ ...thBase, color:"#86efac" }}>EST</th>
                <th className="col-gap" style={{ ...thBase, color:"#fca5a5" }}>GAP</th>
              </tr>
            </thead>
            <tbody>
              <SectionDivider label="Arena" bg="#f8fafc" />
              {ARENA_CLUSTERS.map(cluster => (
                <React.Fragment key={cluster}>
                  {CLUSTERS[cluster].map(id => <LocationRow key={id} id={id} data={data} />)}
                  <ClusterRow
                    label={CLUSTER_WITH_TOTAL.includes(cluster) ? `${cluster} Total` : cluster}
                    ids={CLUSTERS[cluster]} data={data}
                  />
                </React.Fragment>
              ))}
              <TotalRow label="Arena Gujarat Total" ids={allArenaIds} data={data} shade="#1e293b" />

              <SectionDivider label="Nexa" bg="#f0f9ff" />
              {CLUSTERS["Nexa"].map(id => <LocationRow key={id} id={id} data={data} />)}
              <TotalRow label="Nexa Gujarat Total" ids={allNexaIds} data={data} shade="#1e293b" />
              <TotalRow label="Group Total" ids={allIds} data={data} shade="#0f172a" />
            </tbody>
          </table>
          <div style={{ padding:"8px 12px", background:"#fef9c3", fontSize:11, color:"#92400e", fontWeight:600 }}>
            As on date {today} · Coating Progress Report Q1
          </div>
        </div>

      </div>{/* end capture area */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CoatingTracker />);
  </script>
</body>
</html>
