// ── Firebase ──────────────────────────────
function useFirebase() {
  const db=useRef(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    const load=src=>new Promise((res,rej)=>{
      if(document.querySelector(`script[src="${src}"]`)){res();return;}
      const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    (async()=>{
      try{
        await load("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
        await load("https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js");
        if(!window.firebase.apps.length)window.firebase.initializeApp(FIREBASE_CONFIG);
        db.current=window.firebase.database();setReady(true);
      }catch(e){console.error(e);}
    })();
  },[]);
  const listen = (path,cb)=>{if(!db.current)return()=>{};const r=db.current.ref(path);r.on("value",s=>cb(s.val()));return()=>r.off("value");};
  const get    = async path=>{if(!db.current)return null;return(await db.current.ref(path).once("value")).val();};
  const set    = async(path,val)=>{if(!db.current)throw new Error("DB not ready");await db.current.ref(path).set(val);};
  const update = async(path,val)=>{if(!db.current)throw new Error("DB not ready");await db.current.ref(path).update(val);};
  const remove = async path=>{if(!db.current)throw new Error("DB not ready");await db.current.ref(path).remove();};
  return{ready,listen,get,set,update,remove};
}

// ── Safe formula evaluator ─────────────────
function evalFormula(formula,values){
  if(!formula)return 0;
  try{
    let expr=formula.toLowerCase();
    const ids=Object.keys(values).sort((a,b)=>b.length-a.length);
    ids.forEach(id=>{expr=expr.replace(new RegExp('\\b'+id+'\\b','g'),Number(values[id])||0);});
    if(!/^[\d\s\+\-\*\/\(\)\.\%]+$/.test(expr))return"ERR";
    const r=Function('"use strict";return ('+expr+')')();
    if(!isFinite(r))return 0;
    return Math.round(r*10)/10;
  }catch{return"ERR";}
}

function ColumnManager({columns,setColumns,onSave}){
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [preview,setPreview]=useState("");

  const colColors=["#7dd3fc","#86efac","#fca5a5","#fcd34d","#c4b5fd","#f9a8d4","#6ee7b7","#94a3b8"];

  const startEdit=(col)=>{setEditing(col.id);setForm({...col});};
  const startNew=()=>{
    const newCol={id:uid(),label:"New Column",type:"manual",color:"#7dd3fc",visible:true,width:10};
    setEditing("__new__");setForm(newCol);
  };
  const cloneCol=(col)=>{
    const c={...col,id:uid(),label:col.label+" (copy)"};
    const updated=[...columns,c];setColumns(updated);onSave(updated);toast("Column cloned");
  };

  const saveEdit=()=>{
    if(!form.label||!form.id){toast("Label and ID required","err");return;}
    let updated;
    if(editing==="__new__"){updated=[...columns,form];}
    else{updated=columns.map(c=>c.id===editing?form:c);}
    setColumns(updated);onSave(updated);setEditing(null);toast("Column saved ✓");
  };

  const deleteCol=(id)=>{
    if(!confirm("Delete this column?"))return;
    const updated=columns.filter(c=>c.id!==id);setColumns(updated);onSave(updated);toast("Column deleted");
  };

  const move=(idx,dir)=>{
    const arr=[...columns];const to=idx+dir;
    if(to<0||to>=arr.length)return;
    [arr[idx],arr[to]]=[arr[to],arr[idx]];
    setColumns(arr);onSave(arr);
  };

  const toggleVisible=(id)=>{
    const updated=columns.map(c=>c.id===id?{...c,visible:!c.visible}:c);
    setColumns(updated);onSave(updated);
  };

  // Formula preview with dummy values
  useEffect(()=>{
    if(form.type!=="formula"||!form.formula)return;
    const dummies={};columns.forEach(c=>{dummies[c.id]=10;});
    const r=evalFormula(form.formula,dummies);
    setPreview(r==="ERR"?"❌ Invalid formula":`✓ Preview (with dummy value 10 each): ${r}`);
  },[form.formula,columns]);

  const typeColor={target:"#94a3b8",manual:"#60a5fa",formula:"#a78bfa"};

  return(
    <div>
      <div className="section-title">Column Manager</div>
      <div className="section-sub">Add, edit, reorder or remove columns. Formula columns are auto-calculated.</div>

      {editing&&(
        <div className="card" style={{border:"1px solid #3b82f6"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#60a5fa",marginBottom:16}}>{editing==="__new__"?"New Column":"Edit Column"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label className="label">Column Label</label>
              <input className="inp" value={form.label||""} onChange={e=>setForm(p=>({...p,label:e.target.value}))} placeholder="e.g. BKG Till Date"/>
            </div>
            <div>
              <label className="label">Column ID (no spaces)</label>
              <input className="inp" value={form.id||""} onChange={e=>setForm(p=>({...p,id:e.target.value.toLowerCase().replace(/\s/g,"_")}))} placeholder="e.g. bkg" disabled={editing!=="__new__"}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label className="label">Type</label>
              <select className="inp" value={form.type||"manual"} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
                <option value="target">Target (fixed per outlet)</option>
                <option value="manual">Manual (managers enter)</option>
                <option value="formula">Formula (auto-calculated)</option>
              </select>
            </div>
            <div>
              <label className="label">Header Color</label>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
                {colColors.map(c=>(
                  <div key={c} onClick={()=>setForm(p=>({...p,color:c}))}
                    style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:form.color===c?"3px solid #fff":"2px solid transparent",transition:"all 0.15s"}}/>
                ))}
                <input type="color" value={form.color||"#94a3b8"} onChange={e=>setForm(p=>({...p,color:e.target.value}))} style={{width:22,height:22,padding:0,border:"none",borderRadius:"50%",cursor:"pointer",background:"none"}}/>
              </div>
            </div>
            <div>
              <label className="label">Width %</label>
              <input className="inp" type="number" value={form.width||10} onChange={e=>setForm(p=>({...p,width:Number(e.target.value)}))} min={5} max={40}/>
            </div>
          </div>
          {form.type==="formula"&&(
            <div style={{marginBottom:12}}>
              <label className="label">Formula</label>
              <input className="inp" value={form.formula||""} onChange={e=>setForm(p=>({...p,formula:e.target.value}))} placeholder="e.g. aprtgt - est  or  (bkg + est) / aprtgt * 100  or  bkg * 1.1 - est"/>
              <div className="formula-preview">{preview||"Type a formula above using column IDs"}</div>
              <div style={{fontSize:11,color:"#64748b",marginTop:6}}>
                Available IDs: {columns.filter(c=>c.id!==form.id).map(c=><code key={c.id} style={{background:"#0f172a",padding:"1px 5px",borderRadius:4,marginRight:4}}>{c.id}</code>)}
                · Operators: + − * / ( ) and plain numbers like 0.8, 100
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary" onClick={saveEdit}>Save Column</button>
            <button className="btn btn-ghost" onClick={()=>setEditing(null)}>Cancel</button>
          </div>
        </div>
      )}

      <div className="card">
        {columns.map((col,idx)=>(
          <div key={col.id} className="row-item">
            <span className="drag-handle">⠿</span>
            <span style={{width:14,height:14,borderRadius:"50%",background:col.color,display:"inline-block",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13}}>{col.label} <code style={{fontSize:10,color:"#64748b",background:"#0f172a",padding:"1px 4px",borderRadius:4}}>{col.id}</code></div>
              <div style={{fontSize:11,color:"#64748b"}}>{col.type==="formula"?`= ${col.formula}`:col.type}</div>
            </div>
            <span className={`badge badge-${col.type==="target"?"orange":col.type==="manual"?"blue":"purple"}`}>{col.type}</span>
            <label className="toggle"><input type="checkbox" checked={col.visible} onChange={()=>toggleVisible(col.id)}/><span className="slider"/></label>
            <button className="btn btn-ghost btn-sm" onClick={()=>move(idx,-1)} disabled={idx===0}>↑</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>move(idx,1)} disabled={idx===columns.length-1}>↓</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(col)}>Edit</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>cloneCol(col)}>Clone</button>
            <button className="btn btn-danger btn-sm" onClick={()=>deleteCol(col.id)}>✕</button>
          </div>
        ))}
        <button className="btn btn-primary" style={{marginTop:8,width:"100%"}} onClick={startNew}>+ Add New Column</button>
      </div>
    </div>
  );
}

function TargetEditor({columns,locations,setLocations,onSave,firebase}){
  const [locs,setLocs]=useState(locations);
  const [saving,setSaving]=useState(false);
  const targetCols=columns.filter(c=>c.type==="target");

  useEffect(()=>setLocs(locations),[locations]);

  const updateTarget=(locId,colId,val)=>{
    setLocs(prev=>prev.map(l=>l.id===locId?{...l,[colId]:Number(val)||0}:l));
  };

  const save=async()=>{
    setSaving(true);
    try{await firebase.set("appConfig/locations",locs);setLocations(locs);toast("Targets saved ✓");}
    catch(e){toast("Save failed","err");}
    setSaving(false);
  };

  const handleCSV=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"binary"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws);
        const updated=[...locs];
        rows.forEach(row=>{
          const locId=String(row.id||row.ID||"").toLowerCase().trim();
          const found=updated.findIndex(l=>l.id===locId);
          if(found>=0){
            targetCols.forEach(c=>{
              if(row[c.id]!=null)updated[found]={...updated[found],[c.id]:Number(row[c.id])||0};
              if(row[c.label]!=null)updated[found]={...updated[found],[c.id]:Number(row[c.label])||0};
            });
          }
        });
        setLocs(updated);toast("CSV imported — click Save to apply");
      }catch(e){toast("CSV parse error","err");}
    };
    reader.readAsBinaryString(file);
  };

  return(
    <div>
      <div className="section-title">Targets Editor</div>

function OutletsManager({locations,setLocations,columns,onSave}){
  const [form,setForm]=useState({id:"",name:"",cluster:""});
  const [editId,setEditId]=useState(null);
  const [newCluster,setNewCluster]=useState("");
  const clusters=[...new Set(locations.map(l=>l.cluster))];

  const save=()=>{
    if(!form.name||!form.cluster){toast("Name and cluster required","err");return;}
    const id=editId||(form.id||form.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,""));
    let updated;
    if(editId){updated=locations.map(l=>l.id===editId?{...l,name:form.name,cluster:form.cluster}:l);}
    else{
      const defVals={};columns.filter(c=>c.type==="target").forEach(c=>defVals[c.id]=0);
      updated=[...locations,{id,name:form.name,cluster:form.cluster,...defVals}];
    }
    setLocations(updated);onSave(updated);setForm({id:"",name:"",cluster:""});setEditId(null);toast("Outlet saved ✓");
  };

  const del=(id)=>{
    if(!confirm("Delete this outlet?"))return;
    const updated=locations.filter(l=>l.id!==id);setLocations(updated);onSave(updated);toast("Outlet deleted");
  };

  const startEdit=(loc)=>{setEditId(loc.id);setForm({id:loc.id,name:loc.name,cluster:loc.cluster});};

  const addCluster=()=>{
    if(!newCluster.trim())return;
    toast(`Cluster "${newCluster}" ready — add outlets to it`);setNewCluster("");
  };

  return(
    <div>
      <div className="section-title">Outlets Manager</div>
      <div className="section-sub">Add, rename or remove outlets. Assign them to clusters.</div>

      <div className="card">
        <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}}>{editId?"Edit Outlet":"Add New Outlet"}</div>

          </div>
          <div>
            <label className="label">Cluster</label>
            <input className="inp" value={form.cluster} onChange={e=>setForm(p=>({...p,cluster:e.target.value}))} list="clusters-list" placeholder="e.g. Ahmedabad"/>
            <datalist id="clusters-list">{clusters.map(c=><option key={c} value={c}/>)}</datalist>
          </div>
          <div>
            <label className="label">Custom ID (optional)</label>
            <input className="inp" value={form.id} onChange={e=>setForm(p=>({...p,id:e.target.value.toLowerCase().replace(/\s/g,"_")}))} placeholder="auto-generated" disabled={!!editId}/>

        </div>
      </div>

      <div className="card" style={{padding:0,overflow:"auto"}}>
        <table className="table-grid">
          <thead><tr><th>Outlet</th><th>Cluster</th><th>ID</th><th>Actions</th></tr></thead>
          <tbody>
            {locations.map(loc=>(
              <tr key={loc.id}>
                <td style={{fontWeight:600}}>{loc.name}</td>
                <td><span className="badge badge-blue">{loc.cluster}</span></td>
                <td><code style={{fontSize:11,color:"#64748b"}}>{loc.id}</code></td>
                <td style={{display:"flex",gap:6}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(loc)}>Edit</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>del(loc.id)}>Delete</button>

  );

//  SECTION 6: OUTLET ASSIGNMENT
// ══════════════════════════════════════════
function OutletAssignment({firebase,locations}){
  const [users,setUsers]=useState({});
  const [selectedUser,setSelectedUser]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{return firebase.listen("users",d=>setUsers(d||{}));});

  const editors=Object.entries(users).filter(([,u])=>u.role==="editor"||u.role==="admin");

  const toggle=async(userId,locId)=>{
    const user=users[userId];
    const current=user.assignedOutlets||[];
    const updated=current.includes(locId)?current.filter(x=>x!==locId):[...current,locId];
    await firebase.set(`users/${userId}/assignedOutlets`,updated);toast("Assignment updated ✓");
  };

  const assignAll=async(userId)=>{
    await firebase.set(`users/${userId}/assignedOutlets`,locations.map(l=>l.id));toast("All outlets assigned");
  };
  const clearAll=async(userId)=>{
    await firebase.set(`users/${userId}/assignedOutlets`,[]);toast("All outlets cleared");
  };

  const clusters=[...new Set(locations.map(l=>l.cluster))];

  return(
    <div>
      <div className="section-title">Outlet Assignment</div>
      <div className="section-sub">Assign outlets to each editor. Editors only see their assigned outlets.</div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {editors.map(([id,u])=>(
          <button key={id} className={`btn ${selectedUser===id?"btn-primary":"btn-ghost"}`} onClick={()=>setSelectedUser(id)}>
            {u.name} <span style={{opacity:0.6,fontSize:11}}>({(u.assignedOutlets||[]).length})</span>
          </button>
        ))}
        {editors.length===0&&<div style={{color:"#64748b",fontSize:13}}>No editors found. Add users in Password Manager first.</div>}
      </div>

      {selectedUser&&users[selectedUser]&&(
        <div className="card">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{users[selectedUser].name}</div>
              <div style={{fontSize:12,color:"#64748b"}}>{(users[selectedUser].assignedOutlets||[]).length} outlets assigned</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>assignAll(selectedUser)}>Assign All</button>
              <button className="btn btn-danger btn-sm" onClick={()=>clearAll(selectedUser)}>Clear All</button>
            </div>
          </div>
          {clusters.map(cluster=>{
            const clLocs=locations.filter(l=>l.cluster===cluster);
            const assigned=users[selectedUser].assignedOutlets||[];
            const allOn=clLocs.every(l=>assigned.includes(l.id));
            return(
              <div key={cluster} style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#7c3aed",textTransform:"uppercase",letterSpacing:"0.06em"}}>{cluster}</div>
                  <button className="btn btn-ghost btn-sm" onClick={async()=>{
                    const current=users[selectedUser].assignedOutlets||[];
                    let updated;
                    if(allOn){updated=current.filter(x=>!clLocs.map(l=>l.id).includes(x));}
                    else{updated=[...new Set([...current,...clLocs.map(l=>l.id)])];}
                    await firebase.set(`users/${selectedUser}/assignedOutlets`,updated);
                  }}>{allOn?"Deselect Cluster":"Select Cluster"}</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
                  {clLocs.map(loc=>{
                    const on=assigned.includes(loc.id);
                    return(
                      <div key={loc.id} onClick={()=>toggle(selectedUser,loc.id)}
                        style={{padding:"8px 12px",borderRadius:8,border:`1.5px solid ${on?"#3b82f6":"#334155"}`,background:on?"rgba(59,130,246,0.1)":"transparent",cursor:"pointer",fontSize:12,fontWeight:on?600:400,color:on?"#60a5fa":"#94a3b8",display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:14}}>{on?"✓":"○"}</span>{loc.name}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════
//  SECTION 7: AUDIT LOG
// ══════════════════════════════════════════
function AuditLog({firebase,locations}){
  const [log,setLog]=useState({});
  const [filter,setFilter]=useState("");

  useEffect(()=>{return firebase.listen("audit",d=>setLog(d||{}));});

  const entries=useMemo(()=>{
    return Object.entries(log)
      .map(([k,v])=>({key:k,...v}))
      .sort((a,b)=>new Date(b.at)-new Date(a.at))
      .filter(e=>{
        if(!filter)return true;
        const q=filter.toLowerCase();
        const loc=locations.find(l=>l.id===e.locId);
        return (loc?.name||"").toLowerCase().includes(q)||(e.by||"").toLowerCase().includes(q);
      })
      .slice(0,200);
  },[log,filter,locations]);

  const clearLog=async()=>{
    if(!confirm("Clear all audit logs? This cannot be undone."))return;
    await firebase.remove("audit");toast("Audit log cleared");
  };

  return(
    <div>
      <div className="section-title">Audit Log</div>
      <div className="section-sub">Full history of every data update. Who changed what and when.</div>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
        <input className="inp" value={filter} onChange={e=>setFilter(e.target.value)} placeholder="🔍 Filter by outlet or manager…" style={{maxWidth:300}}/>
        <span style={{fontSize:12,color:"#64748b"}}>{entries.length} entries</span>
        <button className="btn btn-danger btn-sm" onClick={clearLog} style={{marginLeft:"auto"}}>Clear Log</button>
      </div>
      <div className="card" style={{padding:0,maxHeight:500,overflowY:"auto"}}>
        {entries.length===0&&<div style={{padding:20,textAlign:"center",color:"#64748b",fontSize:13}}>No audit entries yet.</div>}
        {entries.map(e=>{
          const loc=locations.find(l=>l.id===e.locId);
          const vals=Object.entries(e.values||{}).map(([k,v])=>`${k}:${v}`).join(", ");
          return(
            <div key={e.key} className="audit-row">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                <div>
                  <span style={{fontWeight:600,fontSize:12}}>{loc?.name||e.locId}</span>
                  <span style={{color:"#64748b",fontSize:11,marginLeft:8}}>by <b style={{color:"#94a3b8"}}>{e.by}</b></span>
                </div>
                <span style={{fontSize:11,color:"#64748b"}}>{e.at?new Date(e.at).toLocaleString("en-IN"):""}</span>
              </div>
              <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{vals}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  SECTION 8: DAILY SNAPSHOTS
// ══════════════════════════════════════════
function Snapshots({firebase,locations,columns}){
  const [dates,setDates]=useState([]);
  const [selected,setSelected]=useState(null);
  const [snapData,setSnapData]=useState(null);

  useEffect(()=>{
    firebase.get("snapshots").then(d=>{
      if(d) setDates(Object.keys(d).sort().reverse());
    });
  },[]);

  const loadSnap=async(date)=>{
    setSelected(date);
    const d=await firebase.get(`snapshots/${date}`);
    setSnapData(d||{});
  };

  const visCols=columns.filter(c=>c.visible&&c.type==="manual");

  return(
    <div>
      <div className="section-title">Daily Snapshots</div>
      <div className="section-sub">Auto-saved copies of the report each time data is updated.</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {dates.length===0&&<div style={{color:"#64748b",fontSize:13}}>No snapshots yet. They are created automatically when managers update data.</div>}
        {dates.map(d=>(
          <button key={d} className={`btn ${selected===d?"btn-primary":"btn-ghost"}`} onClick={()=>loadSnap(d)}>{d}</button>
        ))}
      </div>
      {snapData&&(
        <div className="card" style={{padding:0,overflow:"auto"}}>
          <table className="table-grid">
            <thead><tr><th>Outlet</th>{visCols.map(c=><th key={c.id}>{c.label}</th>)}<th>Updated By</th><th>Time</th></tr></thead>
            <tbody>
              {locations.map(loc=>{
                const row=snapData[loc.id];
                if(!row)return null;
                return(
                  <tr key={loc.id}>
                    <td style={{fontWeight:600}}>{loc.name}</td>
                    {visCols.map(c=><td key={c.id} style={{textAlign:"center"}}>{row[c.id]??"-"}</td>)}
                    <td style={{color:"#94a3b8",fontSize:12}}>{row.by||"-"}</td>
                    <td style={{color:"#64748b",fontSize:11}}>{row.at?new Date(row.at).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}):"-"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

      const backup={
        exportedAt:new Date().toISOString(),
        version:"1.0",
        coatingData:coatingData||{},
        appConfig:appConfig||{},
        users:users||{},
        snapshots:snapshots||{},
        audit:audit||{},
      };
      const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=`coating-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      setStatus("✅ Backup downloaded successfully");
    }catch(e){setStatus("❌ Export failed: "+e.message);}
  };

  const handleFileSelect=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version||!data.exportedAt){setStatus("❌ Invalid backup file");return;}
        setBackupPreview(data);
        setStatus("File loaded. Review details below, then click Restore.");
      }catch{setStatus("❌ Could not parse file. Must be a valid JSON backup.");}
    };
    reader.readAsText(file);
  };

  const doRestore=async()=>{
    if(!backupPreview)return;
    if(!confirm("⚠ This will OVERWRITE all current data with the backup. This cannot be undone. Are you sure?"))return;
    setRestoring(true);setStatus("Restoring…");
    try{
      await firebase.set("coatingData",backupPreview.coatingData||{});
      await firebase.set("appConfig",backupPreview.appConfig||{});
      await firebase.set("users",backupPreview.users||{});
      setStatus("✅ Restore complete. Snapshots and audit log preserved.");
      setBackupPreview(null);
    }catch(e){setStatus("❌ Restore failed: "+e.message);}
    setRestoring(false);
  };

  return(
    <div>
      <div className="section-title">Backup & Restore</div>
      <div className="section-sub">Export a full backup of all data. Restore from a previous backup if something goes wrong.</div>

      <div className="card">
        <div style={{fontSize:14,fontWeight:700,color:"#86efac",marginBottom:8}}>📤 Export Backup</div>
        <div style={{fontSize:13,color:"#94a3b8",marginBottom:14,lineHeight:1.7}}>
          Downloads a complete JSON backup of: all coating data, column config, outlet config, user accounts, and settings.<br/>
          <b style={{color:"#e2e8f0"}}>Does not include audit log or snapshots</b> (too large — use Firebase Console for those).
        </div>
        <button className="btn btn-success" onClick={exportBackup}>💾 Download Full Backup</button>
      </div>

      <div className="card" style={{border:"1px solid #854d0e"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#fcd34d",marginBottom:8}}>📥 Restore from Backup</div>
        <div style={{fontSize:13,color:"#94a3b8",marginBottom:14,lineHeight:1.7}}>
          ⚠ <b style={{color:"#fca5a5"}}>This overwrites all current coating data, config, and user accounts</b> with the backup file.<br/>
          Only use this if data was accidentally corrupted or deleted.
        </div>
        <input type="file" accept=".json" ref={fileRef} onChange={handleFileSelect} style={{display:"none"}}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" onClick={()=>fileRef.current?.click()}>📂 Choose Backup File</button>
          {backupPreview&&<button className="btn btn-danger" onClick={doRestore} disabled={restoring}>{restoring?"Restoring…":"⚠ Restore Now"}</button>}
        </div>
        {backupPreview&&(
          <div style={{marginTop:14,background:"#0f172a",borderRadius:8,padding:"12px 14px",fontSize:12}}>
            <div style={{color:"#fcd34d",fontWeight:700,marginBottom:6}}>Backup Details:</div>
            <div style={{color:"#94a3b8",lineHeight:1.8}}>
              Exported: {new Date(backupPreview.exportedAt).toLocaleString("en-IN")}<br/>
              Outlets with data: {Object.keys(backupPreview.coatingData||{}).length}<br/>
              Users: {Object.keys(backupPreview.users||{}).length}<br/>
              Config sections: {Object.keys(backupPreview.appConfig||{}).join(", ")}
            </div>
          </div>
        )}
      </div>

      {status&&(
        <div style={{background:status.startsWith("✅")?"rgba(5,150,105,0.1)":"rgba(220,38,38,0.1)",border:`1px solid ${status.startsWith("✅")?"#059669":"#dc2626"}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:status.startsWith("✅")?"#34d399":"#f87171"}}>
          {status}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════
//  MAIN ADMIN APP
// ══════════════════════════════════════════
function AdminApp(){
  const firebase=useFirebase();
  const [authed,setAuthed]=useState(()=>loadAdminSession());
  const [tab,setTab]=useState("columns");
  const [columns,setColumns]=useState(DEFAULT_COLUMNS);
  const [locations,setLocations]=useState(DEFAULT_LOCATIONS);

  useEffect(()=>{
    if(!firebase.ready)return;
    const u1=firebase.listen("appConfig/columns",d=>{if(d&&Array.isArray(d))setColumns(d);});
    const u2=firebase.listen("appConfig/locations",d=>{if(d&&Array.isArray(d))setLocations(d);});
    return()=>{u1();u2();};
  },[firebase.ready]);

  const saveColumns=async(cols)=>{ try{await firebase.set("appConfig/columns",cols);}catch(e){toast("Save failed","err");} };
  const saveLocations=async(locs)=>{ try{await firebase.set("appConfig/locations",locs);}catch(e){toast("Save failed","err");} };

  if(!authed) return <Login onLogin={()=>{setAuthed(true);saveAdminSession();}} firebase={firebase}/>;

  const tabs=[
    {id:"columns",    label:"📋 Columns"},
    {id:"targets",    label:"🎯 Targets"},
    {id:"outlets",    label:"🏪 Outlets"},
    {id:"settings",   label:"⚙ Settings"},
    {id:"users",      label:"👤 Users"},
    {id:"assignment", label:"🔗 Assignment"},
    {id:"audit",      label:"📜 Audit Log"},
    {id:"snapshots",  label:"📅 Snapshots"},
    {id:"backup",     label:"💾 Backup & Restore"},
  ];

  return(
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#4c1d95,#1e3a5f)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap",boxShadow:"0 2px 10px rgba(0,0,0,0.4)"}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:"#fff",display:"flex",alignItems:"center",gap:8}}>
            ⚙ Admin Panel
            <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:firebase.ready?"rgba(34,197,94,0.2)":"rgba(251,191,36,0.2)",color:firebase.ready?"#86efac":"#fcd34d"}}>
              {firebase.ready?"🔴 LIVE":"OFFLINE"}
            </span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:2}}>Coating Tracker — Admin Only</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <a href="index.html" style={{background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:9,padding:"7px 14px",fontWeight:600,fontSize:12,textDecoration:"none"}}>← Dashboard</a>
          <button onClick={()=>{clearAdminSession();setAuthed(false);}} style={{background:"rgba(220,38,38,0.2)",color:"#fca5a5",border:"1px solid rgba(220,38,38,0.3)",borderRadius:9,padding:"7px 14px",fontWeight:600,fontSize:12,cursor:"pointer"}}>🔒 Logout</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:"#0f172a",padding:"10px 20px",display:"flex",gap:4,overflowX:"auto",borderBottom:"1px solid #1e293b"}}>
        {tabs.map(t=>(
          <button key={t.id} className={`tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)} style={{whiteSpace:"nowrap"}}>{t.label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:"20px",maxWidth:1100,margin:"0 auto"}}>
        {!firebase.ready&&<div style={{background:"rgba(251,191,36,0.1)",border:"1px solid #fcd34d",borderRadius:10,padding:"10px 16px",fontSize:13,color:"#fcd34d",marginBottom:16}}>⚠ Connecting to Firebase…</div>}
        {tab==="columns"    &&<ColumnManager    columns={columns}   setColumns={setColumns}   onSave={saveColumns}/>}
        {tab==="targets"    &&<TargetEditor     columns={columns}   locations={locations}     setLocations={setLocations} onSave={saveLocations} firebase={firebase}/>}
        {tab==="outlets"    &&<OutletsManager   locations={locations} setLocations={setLocations} columns={columns} onSave={saveLocations}/>}
        {tab==="settings"   &&<ReportSettings   firebase={firebase}/>}
        {tab==="users"      &&<PasswordManager  firebase={firebase}/>}
        {tab==="assignment" &&<OutletAssignment firebase={firebase} locations={locations}/>}
        {tab==="audit"      &&<AuditLog         firebase={firebase} locations={locations}/>}
        {tab==="snapshots"  &&<Snapshots        firebase={firebase} locations={locations} columns={columns}/>}
        {tab==="backup"     &&<BackupRestore    firebase={firebase}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp/>);
</script>
</body>
</html>
