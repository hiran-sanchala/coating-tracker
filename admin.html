<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel — Coating Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
      #root { min-height: 100vh; }

      /* ── Inputs ── */
      .inp {
        background: #0f172a;
        border: 1px solid #475569;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 13px;
        outline: none;
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        transition: border-color 0.15s;
      }
      .inp:focus { border-color: #3b82f6; }
      .inp::placeholder { color: #475569; }
      select.inp { cursor: pointer; }

      /* ── Label ── */
      .label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #64748b;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        font-family: inherit;
        transition: opacity 0.15s, transform 0.1s;
        white-space: nowrap;
      }
      .btn:hover { opacity: 0.88; }
      .btn:active { transform: scale(0.97); }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }
      .btn-primary  { background: #3b82f6; color: #fff; }
      .btn-success  { background: #059669; color: #fff; }
      .btn-danger   { background: #dc2626; color: #fff; }
      .btn-ghost    { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
      .btn-ghost:hover { color: #e2e8f0; border-color: #475569; }
      .btn-sm       { padding: 5px 10px; font-size: 12px; }

      /* ── Cards ── */
      .card {
        background: #1e293b;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
        border: 1px solid #334155;
      }

      /* ── Tabs ── */
      .tab {
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #64748b;
        font-family: inherit;
        transition: all 0.15s;
      }
      .tab:hover { color: #94a3b8; background: #1e293b; }
      .tab.active { background: #3b82f6; color: #fff; }

      /* ── Badges ── */
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge-blue   { background: rgba(59,130,246,0.15);  color: #60a5fa; }
      .badge-purple { background: rgba(124,58,237,0.15);  color: #a78bfa; }
      .badge-green  { background: rgba(5,150,105,0.15);   color: #34d399; }
      .badge-orange { background: rgba(234,88,12,0.15);   color: #fb923c; }

      /* ── Toggle switch ── */
      .toggle { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
      .toggle input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0;
        background: #334155; border-radius: 99px; cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 14px; height: 14px;
        left: 3px; top: 3px;
        background: #fff; border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle input:checked + .slider { background: #3b82f6; }
      .toggle input:checked + .slider::before { transform: translateX(16px); }

      /* ── Table grid ── */
      .table-grid {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .table-grid th {
        background: #0f172a;
        color: #94a3b8;
        padding: 10px 12px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid #334155;
        white-space: nowrap;
      }
      .table-grid td {
        padding: 10px 12px;
        border-bottom: 1px solid #1e293b;
        color: #e2e8f0;
        vertical-align: middle;
      }
      .table-grid tr:hover td { background: #1e293b; }
      .table-grid tr:last-child td { border-bottom: none; }

      /* ── Row items (column manager list) ── */
      .row-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #1e293b;
      }
      .row-item:last-child { border-bottom: none; }
      .drag-handle { color: #334155; cursor: grab; font-size: 16px; }

      /* ── Formula preview ── */
      .formula-preview {
        margin-top: 6px;
        font-size: 12px;
        color: #34d399;
        background: #0f172a;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #1e293b;
        min-height: 28px;
      }

      /* ── Audit rows ── */
      .audit-row {
        padding: 10px 14px;
        border-bottom: 1px solid #1e293b;
      }
      .audit-row:hover { background: #1e293b; }
      .audit-row:last-child { border-bottom: none; }

      /* ── Section titles ── */
      .section-title {
        font-family: 'Syne', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #e2e8f0;
        margin-bottom: 4px;
      }
      .section-sub {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 16px;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
    <script type="module" crossorigin src="/assets/admin-CSbuNgIS.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/jsx-runtime-BUwq2lFE.js">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
